name: Daily Justice News

on:
  schedule:
    # Europe/Berlin 23:30 icin DST gecislerine dayanikli tetikleme:
    - cron: "30 21 * * *"   # Yaz saati (CEST, UTC+2)
    - cron: "30 22 * * *"   # Kis saati (CET, UTC+1)
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Gate at 23:30 Europe/Berlin
        if: github.event_name == 'schedule'
        id: gate
        env:
          TZ: Europe/Berlin
        run: |
          HOUR=$(date +%H)
          if [ "$HOUR" = "23" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Berlin saati 23:xx, calisma devam ediyor."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Berlin saati 23:xx degil, bu tetikleme atlandi."
          fi

      - name: Build and Run
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: mvn -B -ntp clean compile exec:java -Dexec.mainClass=org.example.Main
